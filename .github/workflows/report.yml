name: Rapport d'étude de marché

# Régénère reports/README.md + reports/overview.png à partir des données
# collectées, et les committe. Ouvre le dossier reports/ sur GitHub pour voir
# le rapport à jour (et vérifier d'un coup d'œil que la collecte tourne).

on:
  schedule:
    - cron: "20 */3 * * *"       # toutes les 3 h (décalé pour ne pas croiser la collecte)
  workflow_dispatch: {}

permissions:
  contents: write

# même groupe que la collecte : un seul écrivain à la fois sur main
concurrency:
  group: gbfs-repo-write
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les libs d'analyse
        run: pip install --quiet pandas numpy matplotlib

      - name: Générer le rapport
        run: python analyze.py

      - name: Committer le rapport
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "Rapport inchangé."
          else
            git commit -m "report: maj $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
